name: Dependabot PR Analyzer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: false
        type: string

jobs:
  analyze-dependabot-pr:
    uses: libnudget/gon/.github/workflows/gon.yml@main
    permissions:
      pull-requests: write
      contents: read
    with:
      pr_number: ${{ github.event.pull_request.number }}
      trigger_user: dependabot[bot]
    if: github.actor == 'dependabot[bot]'

  analyze-on-comment:
    uses: libnudget/gon/.github/workflows/gon.yml@main
    permissions:
      pull-requests: write
      contents: read
    with:
      pr_number: ${{ github.event.issue.number }}
      trigger_user: ${{ github.event.comment.user.login }}
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/analyze')

  analyze-on-dispatch:
    uses: libnudget/gon/.github/workflows/gon.yml@main
    permissions:
      pull-requests: write
      contents: read
    with:
      pr_number: ${{ github.event.inputs.pr_number }}
      trigger_user: ${{ github.actor }}
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
