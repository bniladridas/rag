name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write
      deployments: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install wheel build pyinstaller dmgbuild

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote
        run: |
          git fetch origin
          git stash || true
          git rebase origin/main || true
          git stash pop || true

      - name: Validate release history
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | head -n 1)
          REACHABLE_TAG=$(git tag --merged HEAD --sort=-version:refname | head -n 1)
          LAST_RELEASE_COMMIT=$(git log --grep='^chore(release): ' -n 1 --format='%H %s' || true)

          echo "Latest repository tag: ${LATEST_TAG:-<none>}"
          echo "Latest tag reachable from main: ${REACHABLE_TAG:-<none>}"
          echo "Latest release commit on main: ${LAST_RELEASE_COMMIT:-<none>}"

          if [ -n "$LATEST_TAG" ] && [ -z "$REACHABLE_TAG" ]; then
            echo "::error::No release tag is reachable from the current main branch."
            echo "::error::semantic-release would use an initial-version path"
            echo "::error::and report a misleading 1.0.0 result."
            echo "::error::Retag the latest reachable release commit on main"
            echo "::error::or repair branch history so release tags are ancestors of main."
            exit 1
          fi

          if [ -n "$LATEST_TAG" ] && [ -n "$REACHABLE_TAG" ] && [ "$LATEST_TAG" != "$REACHABLE_TAG" ]; then
            echo "::warning::Latest repository tag ($LATEST_TAG) differs from"
            echo "::warning::the latest tag reachable from main ($REACHABLE_TAG)."
            echo "::warning::semantic-release will only consider tags in main history."
          fi

      - name: Run semantic release
        id: semantic
        run: |
          set +e
          OUTPUT=$(semantic-release version --push --tag --vcs-release 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::semantic-release failed with exit code $STATUS"
            exit "$STATUS"
          fi
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "version=" >> $GITHUB_OUTPUT
          else
            VERSION=$(echo "$OUTPUT" | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Ensure release commit is on main
        if: steps.semantic.outputs.version != ''
        run: |
          git fetch origin main --tags
          RELEASE_TAG="v${{ steps.semantic.outputs.version }}"
          RELEASE_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
          MAIN_COMMIT=$(git rev-parse origin/main)

          echo "Release tag: $RELEASE_TAG"
          echo "Release commit: $RELEASE_COMMIT"
          echo "origin/main: $MAIN_COMMIT"

          if [ "$RELEASE_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "Release commit is not on origin/main. Pushing HEAD to main..."
            git push origin HEAD:main
            git fetch origin main --tags
            MAIN_COMMIT=$(git rev-parse origin/main)
          fi

          if [ "$RELEASE_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "::error::Release tag $RELEASE_TAG points to $RELEASE_COMMIT but origin/main is $MAIN_COMMIT"
            echo "::error::The release commit was tagged but not published on main."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Add changelog entry
        if: steps.semantic.outputs.version != ''
        run: |
          TAG="${{ steps.semantic.outputs.version }}"
          if grep -q "^## $TAG " CHANGELOG.md; then
            echo "Tag $TAG already in changelog"
          else
            DATE=$(date +%Y-%m-%d)
            {
              echo "## $TAG ($DATE)"
              echo ""
            } > /tmp/new_entries.md
            PREV_TAG=$(git describe --tags --abbrev=0 $TAG^ 2>/dev/null || echo "$TAG")
            CHANGES=$(git log --oneline $PREV_TAG..$TAG 2>/dev/null | \
              grep -Ev "chore\(release\)|fix:.*changelog|docs: update changelog|docs: update webpage version" || true)
            HAS_ENTRIES=false
            FIXES=$(echo "$CHANGES" | grep -E "fix:" || true)
            if [ -n "$FIXES" ]; then
              echo "### Fix" >> /tmp/new_entries.md
              echo "$FIXES" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            FEATS=$(echo "$CHANGES" | grep -E "feat:" || true)
            if [ -n "$FEATS" ]; then
              echo "### Feature" >> /tmp/new_entries.md
              echo "$FEATS" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            CHORES=$(echo "$CHANGES" | grep -E "chore:" || true)
            if [ -n "$CHORES" ]; then
              echo "### Chore" >> /tmp/new_entries.md
              echo "$CHORES" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            DOCS=$(echo "$CHANGES" | grep -E "docs:" || true)
            if [ -n "$DOCS" ]; then
              echo "### Documentation" >> /tmp/new_entries.md
              echo "$DOCS" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            if [ "$HAS_ENTRIES" = false ]; then
              echo "No significant changes." >> /tmp/new_entries.md
            fi
            # Preserve markdown header if it exists, otherwise use whole file
            FIRST_LINE=$(head -1 CHANGELOG.md)
            if [[ "$FIRST_LINE" =~ ^#[^#] ]]; then
              HEADER="$FIRST_LINE"
              BLANK_LINE=$(sed -n '2p' CHANGELOG.md)
              {
                echo "$HEADER"
                [ -n "$BLANK_LINE" ] && echo ""
                cat /tmp/new_entries.md
                tail -n +3 CHANGELOG.md
              } > CHANGELOG.md
            else
              cat /tmp/new_entries.md CHANGELOG.md > /tmp/combined.md
              mv /tmp/combined.md CHANGELOG.md
            fi
            echo "Updated CHANGELOG.md with $TAG"
          fi

      - name: Enhance changelog
        if: steps.semantic.outputs.version != ''
        run: |
          python scripts/enhance_changelog.py
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes"
          else
            git add CHANGELOG.md
            git commit -m "docs: update changelog"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Update webpage version
        if: steps.semantic.outputs.version != ''
        run: |
          python scripts/update_webpage_version.py
          if git diff --quiet release-webpage/index.html release-webpage/index-new.html; then
            echo "No version change needed"
          else
            git add release-webpage/index.html release-webpage/index-new.html
            git commit -m "docs: update webpage version"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Trigger pages deployment
        if: steps.semantic.outputs.version != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ github.token }}
          event-type: deploy

      - name: Build package
        if: steps.semantic.outputs.version != ''
        run: |
          python -m build
          git archive --format=zip --output dist/python.zip HEAD

      - name: Build macOS apps
        if: steps.semantic.outputs.version != ''
        run: |
          chmod +x scripts/build_macos_apps.sh
          ./scripts/build_macos_apps.sh

      - name: Upload release assets
        if: steps.semantic.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semantic.outputs.version }}
          files: |
            dist/python.zip
            dist/*.whl
            dist/*.tar.gz
            RAG_Minimal_TUI.dmg
            RAG_Transformer.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
