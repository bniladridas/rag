name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write
      deployments: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install wheel build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote
        run: |
          git fetch origin
          git stash || true
          git rebase origin/main || true
          git stash pop || true

      - name: Run semantic release
        run: semantic-release version --push --tag --vcs-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Add changelog entry
        run: |
          TAG=$(git describe --tags --abbrev=0)
          if grep -q "^## $TAG " CHANGELOG.md; then
            echo "Tag $TAG already in changelog"
          else
            DATE=$(date +%Y-%m-%d)
            {
              echo "## $TAG ($DATE)"
              echo ""
            } > /tmp/new_entries.md
            PREV_TAG=$(git describe --tags --abbrev=0 $TAG^ 2>/dev/null || echo "$TAG")
            CHANGES=$(git log --oneline $PREV_TAG..$TAG 2>/dev/null | \
              grep -Ev "chore\(release\)|fix:.*changelog|docs: update changelog|docs: update webpage version" || true)
            HAS_ENTRIES=false
            FIXES=$(echo "$CHANGES" | grep -E "fix:" || true)
            if [ -n "$FIXES" ]; then
              echo "### Fix" >> /tmp/new_entries.md
              echo "$FIXES" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            FEATS=$(echo "$CHANGES" | grep -E "feat:" || true)
            if [ -n "$FEATS" ]; then
              echo "### Feature" >> /tmp/new_entries.md
              echo "$FEATS" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            CHORES=$(echo "$CHANGES" | grep -E "chore:" || true)
            if [ -n "$CHORES" ]; then
              echo "### Chore" >> /tmp/new_entries.md
              echo "$CHORES" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            DOCS=$(echo "$CHANGES" | grep -E "docs:" || true)
            if [ -n "$DOCS" ]; then
              echo "### Documentation" >> /tmp/new_entries.md
              echo "$DOCS" | sed 's/^[a-f0-9]* /\* /' >> /tmp/new_entries.md
              echo "" >> /tmp/new_entries.md
              HAS_ENTRIES=true
            fi
            if [ "$HAS_ENTRIES" = false ]; then
              echo "No significant changes." >> /tmp/new_entries.md
            fi
            # Preserve markdown header if it exists, otherwise use whole file
            FIRST_LINE=$(head -1 CHANGELOG.md)
            if [[ "$FIRST_LINE" =~ ^#[^#] ]]; then
              HEADER="$FIRST_LINE"
              BLANK_LINE=$(sed -n '2p' CHANGELOG.md)
              {
                echo "$HEADER"
                [ -n "$BLANK_LINE" ] && echo ""
                cat /tmp/new_entries.md
                tail -n +3 CHANGELOG.md
              } > CHANGELOG.md
            else
              cat /tmp/new_entries.md CHANGELOG.md > /tmp/combined.md
              mv /tmp/combined.md CHANGELOG.md
            fi
            echo "Updated CHANGELOG.md with $TAG"
          fi

      - name: Enhance changelog
        run: |
          python scripts/enhance_changelog.py
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes"
          else
            git add CHANGELOG.md
            git commit -m "docs: update changelog"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Update webpage version
        run: |
          python scripts/update_webpage_version.py
          if git diff --quiet release-webpage/index.html; then
            echo "No version change needed"
          else
            git add release-webpage/index.html
            git commit -m "docs: update webpage version"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Trigger pages deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ github.token }}
          event-type: deploy

      - name: Build package
        run: python -m build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
